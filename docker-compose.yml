version: '3.8'

services:
  postgres-db:
    image: postgres:18.4
    container_name: banking_postgres
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: password
      POSTGRES_DB: BankingDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18

volumes:
  postgres_data: